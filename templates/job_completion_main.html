

{% load static %}
<!DOCTYPE html>
<html lang="en">
<head><link rel="icon" type="image/png" href="/static/assets/logo-light.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/vendor/tailwind.min.css">
    <link rel="stylesheet" href="/static/vendor/datatables/jquery.dataTables.min.css">
    <script src="/static/vendor/jquery-3.6.4.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{%static "style.css" %}">
    <title>Work Completion</title>
    <script src="/static/vendor/jquery-3.6.4.min.js"></script>
    <script src="/static/vendor/datatables/jquery.dataTables.min.js"></script>
    <link href="/static/vendor/select2/select2.min.css" rel="stylesheet" />
    <script src="/static/vendor/select2/select2.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
    <!-- For mobile menu toggle functionality -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuButton = document.getElementById('menu-button');
            const sidebar = document.getElementById('sidebar');
            
            if(menuButton&&sidebar)menuButton.addEventListener('click', function() {
                sidebar.classList.toggle('-translate-x-full');
                sidebar.classList.toggle('transform-none');
            });
        });
    </script>
    <style>
        .NEQS,
        .PEQS {
            display: none;
        }
        
        /* Add this CSS to your stylesheet */
        @media screen and (min-width: 768px) and (max-width: 1024px) {
            .side-nav {
                width: 100%; /* Make the navigation full width */
                left: -100%; /* Hide it off-screen by default */
                transition: left 0.3s ease;
                font-size:15px;
            }

            .side-nav.show {
                left: 0; /* Show the navigation on smaller screens */
            }
        }

        /* Add a hamburger menu icon for mobile */
        @media screen and (min-width: 768px) and (max-width: 1024px) {
            .menu-toggle {
                display: block; /* Show the toggle button on small screens */
            }

            .menu-toggle a {
                cursor: pointer;
            }
        }

        /* You can style the hamburger icon as you like */
        .menu-toggle i {
            font-size: 24px;
            margin-right: 10px;
        }

        /* Add this CSS to make the submenus visible on mobile */
        @media screen and (min-width: 768px) and (max-width: 1024px) {
            .sub-menu.show {
                display: block;
            }
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
        }
        table {
            min-width: 800px;
        }
        .water-form-table {
        table-layout: fixed;
        width: 100%;
    }
    .water-form-table td, .water-form-table th {
        word-wrap: break-word;
        overflow-wrap: break-word;
        padding: 8px;
    }
    
    
    
    /* Make inputs fill their containers */
    .water-form-table input {
        width: 100%;
        box-sizing: border-box;
    }
    </style>
</head>
<body class="bg-gray-100 font-sans overflow-hidden">
    <section id="header" class="h-20 w-full bg-gray-900 flex flex-wrap items-center justify-between p-4 fixed top-0">
            <a href="{% url 'nav' %}"><img class="h-14 ml-10" src="{% static '/assets/logo-light.png'%}" alt="image"></a><nav class="hdrnav" style="display:flex;flex-wrap:wrap;align-items:center;gap:8px"><style>.hq{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border:1px solid rgba(255,255,255,.28);border-radius:8px;color:#d1d5db;font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s,border-color .15s,color .15s}.hq:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.55);color:#fff}.hq.hqact{background:#059669;border-color:#059669;color:#fff}.hq i{font-size:12px}</style><a class="hq" href="{% url 'nav' %}"><i class="fa-solid fa-house"></i>Home</a><a class="hq" href="{% url 'home' %}"><i class="fa-solid fa-file-lines"></i>Reports</a><a class="hq" href="{% url 'certificate' %}"><i class="fa-solid fa-certificate"></i>Certificates</a><a class="hq" href="{% url 'sample_main' %}"><i class="fa-solid fa-flask"></i>Samples</a><a class="hq" href="{% url 'qc_main' %}"><i class="fa-solid fa-clipboard-check"></i>QC</a><a class="hq" href="/dashboard/dashboard/"><i class="fa-solid fa-chart-line"></i>Dashboard</a><a class="hq" href="{% url 'job_main' %}"><i class="fa-solid fa-list-check"></i>Work</a></nav><script>document.addEventListener("DOMContentLoaded",function(){document.querySelectorAll("a.hq").forEach(function(a){if(a.getAttribute("href")===window.location.pathname){a.classList.add("hqact");}});});</script>
            
            <div id="profile" class="flex space-x-10 mr-10">
                <span class="text-gray-200 text-xl flex gap-2"><i class="fa-regular fa-user pt-1" style="color: #00ad54;"></i><p class="text-gray-400">{{user.username}}</p></span>
                <a href="{% url 'logout'  %}" class="w-24 mt-1  text-gray-200"><i class="fa-solid fa-power-off pr-2 text-red-400"></i>Logout</a>
            </div>
        </section>
    <div class="flex h-screen overflow-hidden">
        

        

        <!-- Main content -->
        <div class="flex-1 overflow-auto mt-20">
            <header class="bg-white shadow-sm">
                <div class="max-w-7xl mx-auto py-4 px-4 sm:px-6 lg:px-8">
                    <h1 class="text-2xl font-semibold text-gray-900">Work Completion</h1>
                </div>
            </header>
            <main class="max-w-7xl h-screen flex justify-center items-center mx-auto py-6 sm:px-6 lg:px-8 overflow-hidden">
                <div class="flex justify-center items-center gap-10">
                    <a class="rounded-xl bg-gradient-to-r from-blue-500 to-blue-600 text-white p-6 text-center shadow-lg transform hover:scale-105 transition" href="{% url 'job_completion_form' %}">Work Completion Form</a>
                    <a class="rounded-xl bg-gradient-to-r from-indigo-500 to-indigo-600 text-white p-6 text-center shadow-lg transform hover:scale-105 transition" href="{% url 'job_completion_list' %}">Work Completion List</a>
                </div>
            </main>
       </div>
    </div>
   
    <script src="{% static '/js/app.js' %}"></script>
</body>
</html>
