<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EnviTechAL - Management Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Calibri,Arial,sans-serif;background:#f0f4f1;color:#1F2937}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:linear-gradient(120deg,#0d1522,#1F2937 60%,#123527);box-shadow:0 2px 12px rgba(0,0,0,.25);position:sticky;top:0;z-index:5}
.brand{color:#fff;font-weight:800;font-size:19px;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
.brand .dot{width:12px;height:12px;border-radius:50%;background:#00A651;box-shadow:0 0 12px #00A651}
.brand small{color:#9ca3af;font-weight:500;font-size:12px;margin-left:6px}
nav{display:flex;gap:8px;flex-wrap:wrap}
nav a{color:#d1d5db;text-decoration:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.14);transition:.2s}
nav a:hover{background:rgba(0,166,81,.18);color:#fff;border-color:#00A651}
nav a.cur{background:#00A651;color:#fff;border-color:#00A651}
nav a.out{border-color:rgba(239,68,68,.5);color:#fca5a5}
main{max-width:1320px;margin:0 auto;padding:22px 24px 48px}
.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.pill{border:1px solid #d1d5db;background:#fff;color:#374151;font-weight:600;font-size:13px;padding:8px 18px;border-radius:20px;cursor:pointer;margin-right:6px}
.pill.active{background:#00A651;border-color:#00A651;color:#fff;box-shadow:0 3px 10px rgba(0,166,81,.35)}
.stamp{font-size:12px;color:#6B7280}
.loader{text-align:center;padding:70px 0;color:#6B7280;font-size:15px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-bottom:18px}
.card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 2px 10px rgba(31,41,55,.07);border-top:3px solid #00A651}
.card .num{font-size:27px;font-weight:800;color:#111827;line-height:1.1}
.card .num small{font-size:13px;font-weight:700}
.card .lbl{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:#6B7280;margin-top:6px}
.card.slate{border-top-color:#1F2937}
.card.amber{border-top-color:#d97706}
.delta{font-size:12px;font-weight:700;margin-left:7px;vertical-align:middle}
.delta.up{color:#00753a}.delta.down{color:#b91c1c}
.grid2{display:grid;grid-template-columns:1.7fr 1fr;gap:14px;margin-bottom:18px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:14px;margin-bottom:18px}
.grid2b{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
.panel{background:#fff;border-radius:14px;padding:18px 20px;box-shadow:0 2px 10px rgba(31,41,55,.07)}
.panel h3{font-size:14px;color:#1F2937;margin-bottom:12px;border-left:4px solid #00A651;padding-left:9px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:#1F2937;color:#fff;text-align:left;padding:7px 9px;font-size:11px;letter-spacing:.4px}
td{padding:7px 9px;border-bottom:1px solid #eef1ee}
tr:nth-child(even) td{background:#f7faf8}
.chip{display:inline-block;background:#fee2e2;color:#b91c1c;font-weight:700;border-radius:10px;padding:1px 8px;font-size:11px}
.feed-item{display:flex;gap:10px;padding:8px 2px;border-bottom:1px solid #eef1ee;font-size:12.5px;align-items:baseline}
.feed-item .act{font-weight:700;min-width:56px}
.act.Created{color:#00753a}.act.Edited{color:#92600a}.act.Deleted{color:#b91c1c}
.feed-item .meta{color:#6B7280;font-size:11px;margin-left:auto;white-space:nowrap}
.empty{color:#9ca3af;font-size:13px;padding:14px 4px}
@media(max-width:900px){.grid2,.grid2b{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>ENVI TECH AL<small>Management Dashboard</small></div>
  <nav>
    <a href="/">Home</a>
    <a href="/certificate/">Certificates</a>
    <a href="/loggingList/">Logging</a>
    <a class="cur" href="/dashboard/dashboard/">Dashboard</a>
    <a class="out" href="/logout/">Logout</a>
  </nav>
</header>
<main>
  <div class="topline">
    <div>
      <button class="pill active" data-f="monthly">This month</button>
      <button class="pill" data-f="quarterly">This quarter</button>
      <button class="pill" data-f="yearly">This year</button>
    </div>
    <div class="stamp" id="stamp"></div>
  </div>
  <div class="loader" id="loader">Loading dashboard&hellip;</div>
  <section id="content" style="display:none">
    <div class="cards" id="kpis"></div>
    <div class="grid2">
      <div class="panel"><h3>Monthly volume &mdash; <span id="yr"></span></h3><canvas id="chMonthly" height="120"></canvas></div>
      <div class="panel"><h3>Reports by type (period)</h3><canvas id="chTypes" height="230"></canvas></div>
    </div>
    <div class="grid4">
      <div class="panel"><h3>Reports by industry</h3><canvas id="chIndustry" height="210"></canvas></div>
      <div class="panel"><h3>Top clients (period)</h3><canvas id="chClients" height="210"></canvas></div>
      <div class="panel"><h3>Certificates by type</h3><canvas id="chCerts" height="210"></canvas></div>
      <div class="panel"><h3>Team activity &mdash; last 30 days</h3><canvas id="chTeam" height="210"></canvas></div>
    </div>
    <div class="grid2b">
      <div class="panel"><h3>Late reports vs committed date</h3><div id="late"></div></div>
      <div class="panel"><h3>Recent activity (audit trail)</h3><div id="feed"></div></div>
    </div>
  </section>
</main>
<script>
var CH={};
var PAL=['#00A651','#1F2937','#34d399','#6B7280','#0e9f8f','#84cc16','#065f46','#9ca3af','#166534','#4b5563','#22c55e','#374151','#a3e635','#111827','#57c785'];
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function card(n,l,cls,delta){var d='';
  if(delta!==undefined&&delta!==null&&isFinite(delta)){var up=delta>=0;d='<span class="delta '+(up?'up':'down')+'">'+(up?'▲':'▼')+' '+Math.abs(delta)+'%</span>';}
  return '<div class="card'+(cls?' '+cls:'')+'"><div class="num">'+n+d+'</div><div class="lbl">'+l+'</div></div>';}
function mk(id,cfg){if(CH[id])CH[id].destroy();CH[id]=new Chart(document.getElementById(id),cfg);}
function hbar(id,pairs,color){
  mk(id,{type:'bar',data:{labels:pairs.map(function(p){return p[0];}),datasets:[{data:pairs.map(function(p){return p[1];}),backgroundColor:color,borderRadius:4}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{precision:0}},y:{ticks:{font:{size:10.5},autoSkip:false}}}}});}
function pct(cur,prev){if(!prev)return null;return Math.round(1000.0*(cur-prev)/prev)/10;}
function load(f){
  document.getElementById('loader').style.display='block';
  fetch('/dashboard/api/filter/?filter='+f,{credentials:'include'}).then(function(r){
    if(!r.ok){throw new Error('Administrator access is required for the dashboard ('+r.status+')');}
    return r.json();
  }).then(function(d){
    document.getElementById('loader').style.display='none';
    document.getElementById('content').style.display='block';
    document.getElementById('stamp').textContent='Data as of '+d.generated_at+' (refreshes every 5 minutes)';
    document.getElementById('yr').textContent=d.year;
    var period=f==='monthly'?'this month':(f==='quarterly'?'this quarter':'this year');
    var prevLbl=f==='monthly'?'vs last month':(f==='quarterly'?'vs last quarter':'vs last year');
    var ot=d.ontime&&d.ontime.pct!==null?d.ontime.pct:null;
    var off=d.office||{};
    document.getElementById('kpis').innerHTML=
      card(d.totals.reports,'Reports '+period,'',pct(d.totals.reports,d.prev.reports))+
      card(d.totals.certs,'Certificates '+period,'',pct(d.totals.certs,d.prev.certs))+
      card(d.totals.samples,'Samples registered')+
      card(d.totals.jobs,'Job completions')+
      card(ot===null?'—':ot+'<small>%</small>','On-time delivery '+period,ot!==null&&ot<90?'amber':'')+
      card((off.Karachi||0)+' <small>/</small> '+(off.Lahore||0),'Karachi / Lahore reports','slate')+
      card(d.approved_total,'Approved records','slate')+
      card(d.activity_7d,'Changes last 7 days','slate');
    var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    mk('chMonthly',{type:'bar',data:{labels:months,datasets:[
      {label:'Reports',data:d.monthly_reports,backgroundColor:'#00A651',borderRadius:5},
      {label:'Certificates',data:d.monthly_certs,backgroundColor:'#1F2937',borderRadius:5}]},
      options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});
    var entries=Object.keys(d.reports_data).map(function(k){return [k,d.reports_data[k]];}).filter(function(e){return e[1]>0;});
    entries.sort(function(a,b){return b[1]-a[1];});
    if(entries.length){mk('chTypes',{type:'doughnut',data:{labels:entries.map(function(e){return e[0];}),
      datasets:[{data:entries.map(function(e){return e[1];}),backgroundColor:PAL,borderWidth:1}]},
      options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:10.5}}}}}});}
    hbar('chIndustry',d.industry_data||[],'#00A651');
    hbar('chClients',d.top_clients||[],'#1F2937');
    var cd=d.certs_data||{};
    mk('chCerts',{type:'bar',data:{labels:Object.keys(cd),datasets:[{data:Object.keys(cd).map(function(k){return cd[k];}),
      backgroundColor:['#00A651','#1F2937','#0e9f8f'],borderRadius:6}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});
    hbar('chTeam',d.team_30d||[],'#0e9f8f');
    var lt=d.late_reports||[];
    if(!lt.length){document.getElementById('late').innerHTML='<div class="empty">No late reports in this period. Well done.</div>';}
    else{
      var h='<table><tr><th>Type</th><th>Lab report no</th><th>Client</th><th>Committed</th><th>Reported</th><th>Late</th></tr>';
      lt.forEach(function(r){h+='<tr><td>'+esc(r.type)+'</td><td>'+esc(r.lab_no)+'</td><td>'+esc(r.client)+'</td><td>'+esc(r.estimated)+'</td><td>'+esc(r.actual)+'</td><td><span class="chip">'+r.days_late+' d</span></td></tr>';});
      if(d.ontime&&d.ontime.late>lt.length){h+='<tr><td colspan="6" style="color:#6B7280">Showing worst '+lt.length+' of '+d.ontime.late+' late reports.</td></tr>';}
      document.getElementById('late').innerHTML=h+'</table>';
    }
    var fa=d.recent_activity||[];
    if(!fa.length){document.getElementById('feed').innerHTML='<div class="empty">No recorded changes yet. Activity appears here as the team works.</div>';}
    else{
      var g='';
      fa.forEach(function(a){g+='<div class="feed-item"><span class="act '+esc(a.action)+'">'+esc(a.action)+'</span><span>'+esc(a.model)+' &middot; '+esc(a.ref)+' by <b>'+esc(a.user)+'</b></span><span class="meta">'+esc(a.when)+'</span></div>';});
      document.getElementById('feed').innerHTML=g;
    }
  }).catch(function(e){
    document.getElementById('loader').textContent=e.message;
  });
}
document.querySelectorAll('.pill').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.pill').forEach(function(x){x.classList.remove('active');});
    b.classList.add('active');load(b.getAttribute('data-f'));
  });
});
load('monthly');
</script>
</body>
</html>
