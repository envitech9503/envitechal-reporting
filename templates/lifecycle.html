<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EnviTechAL - Sample Lifecycle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Calibri,Arial,sans-serif;background:#f0f4f1;color:#1F2937}
header{display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:linear-gradient(120deg,#0d1522,#1F2937 60%,#123527);position:sticky;top:0;z-index:5}
.brand{color:#fff;font-weight:800;font-size:19px;display:flex;align-items:center;gap:10px}
.brand .dot{width:12px;height:12px;border-radius:50%;background:#00A651;box-shadow:0 0 12px #00A651}
.brand small{color:#9ca3af;font-weight:500;font-size:12px;margin-left:6px}
nav{display:flex;gap:8px;flex-wrap:wrap}
nav a{color:#d1d5db;text-decoration:none;font-size:13px;font-weight:600;padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.14)}
nav a:hover{background:rgba(0,166,81,.18);color:#fff;border-color:#00A651}
nav a.cur{background:#00A651;color:#fff;border-color:#00A651}
nav a.out{border-color:rgba(239,68,68,.5);color:#fca5a5}
main{width:min(100%,1500px);margin-inline:auto;padding:20px clamp(14px,2vw,30px) 44px}
.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.topline select{border:1px solid #d1d5db;border-radius:8px;padding:7px 10px;font-size:13px}
.stamp{font-size:12px;color:#6B7280}
.board{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;align-items:start}
@media(max-width:1100px){.board{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media(max-width:640px){.board{grid-template-columns:1fr}}
.col{background:#e9efe9;border-radius:14px;padding:10px;min-height:340px}
.col h3{font-size:13px;font-weight:700;color:#1F2937;padding:6px 8px 10px;display:flex;justify-content:space-between}
.col h3 .n{background:#1F2937;color:#fff;border-radius:10px;padding:0 9px;font-size:11.5px;line-height:19px}
.col.Registered h3{border-bottom:3px solid #6B7280}.col.Intesting h3{border-bottom:3px solid #d97706}
.col.QCreview h3{border-bottom:3px solid #7c3aed}.col.Reported h3{border-bottom:3px solid #00A651}.col.Invoiced h3{border-bottom:3px solid #1F2937}
.card{background:#fff;border:1px solid #e2e8e2;border-radius:10px;padding:9px 11px;margin-bottom:9px;box-shadow:0 1px 4px rgba(31,41,55,.06)}
.card .sid{font-weight:700;font-size:12.5px;color:#111827}
.card .cl{font-size:11.5px;color:#6B7280;margin:3px 0}
.card .due{font-size:11px;color:#92600a}
.card select{width:100%;margin-top:7px;border:1px solid #d1d5db;border-radius:6px;padding:4px 6px;font-size:11.5px;color:#374151}
.badge{display:inline-block;font-size:10px;font-weight:700;color:#00753a;background:#e6f7ee;border-radius:8px;padding:0 6px;margin-left:5px}
.empty{color:#9ca3af;font-size:12px;text-align:center;padding:22px 6px}
.loader{text-align:center;padding:60px;color:#6B7280}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>ENVI TECH AL<small>Sample Lifecycle Board</small></div>
  <nav>
    <a href="/">Home</a>
    <a href="/certificate/">Certificates</a>
    <a href="/dashboard/dashboard/">Dashboard</a>
    <a href="/dashboard/audit/">Audit</a>
    <a class="cur" href="/dashboard/lifecycle/">Lifecycle</a>
    <a class="out" href="/logout/">Logout</a>
  </nav>
</header>
<main>
  <div class="topline">
    <div>Samples registered in the last
      <select id="days"><option>30</option><option selected>60</option><option>90</option><option>180</option></select> days
    </div>
    <div class="stamp">Move a sample with its dropdown &middot; "auto" = reported status detected automatically</div>
  </div>
  <div class="loader" id="loader">Loading board&hellip;</div>
  <div class="board" id="board" style="display:none"></div>
</main>
<script>
var STS=[];
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function load(){
  document.getElementById('loader').style.display='block';
  fetch('/dashboard/api/lifecycle/?days='+document.getElementById('days').value,{credentials:'include'})
  .then(function(r){if(!r.ok)throw new Error('Failed ('+r.status+')');return r.json();})
  .then(function(d){
    STS=d.statuses;var b=document.getElementById('board');b.innerHTML='';
    d.statuses.forEach(function(st){
      var col=document.createElement('div');col.className='col '+st.replace(/[^A-Za-z]/g,'');
      var h='<h3>'+esc(st)+'<span class="n">'+(d.counts[st]||0)+'</span></h3>';
      var items=d.columns[st]||[];
      if(!items.length)h+='<div class="empty">No samples</div>';
      items.forEach(function(c){
        var opts='';STS.forEach(function(x){opts+='<option'+(x===st?' selected':'')+'>'+esc(x)+'</option>';});
        h+='<div class="card"><div class="sid">'+esc(c.sample_id)+(c.auto?'<span class="badge">auto</span>':'')+'</div>'+
           (c.client?'<div class="cl">'+esc(c.client)+'</div>':'')+
           (c.due?'<div class="due">Committed: '+esc(c.due)+'</div>':'')+
           '<select onchange="move(\''+esc(c.sample_id).replace(/'/g,"\\'")+'\',this.value)">'+opts+'</select></div>';
      });
      col.innerHTML=h;b.appendChild(col);
    });
    document.getElementById('loader').style.display='none';b.style.display='grid';
  }).catch(function(e){document.getElementById('loader').textContent=e.message;});
}
function move(sid,st){
  var fd=new FormData();fd.append('sample_id',sid);fd.append('status',st);
  fetch('/dashboard/api/lifecycle-set/',{method:'POST',body:fd,credentials:'include'})
  .then(function(r){return r.json();}).then(function(j){if(j&&j.ok){load();}else{alert((j&&j.error)||'Failed');}})
  .catch(function(e){alert('Failed: '+e.message);});
}
document.getElementById('days').addEventListener('change',load);
load();
</script>
</body>
</html>
