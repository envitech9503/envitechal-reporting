<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Envi Tech AL{% endblock %}</title>
  {% block page_css %}<link rel="stylesheet" href="/static/css/dashboard.css">{% endblock %}

</head>
<body>
<header>
  <div class="brand"><span class="dot"></span>ENVI TECH AL<small>{% block brand_sub %}{% endblock %}</small></div>

{% block content %}{% endblock %}

</html>
