{% extends "base_app.html" %}
{% block title %}EnviTechAL - Audit Trail{% endblock %}
{% block brand_sub %}Audit Trail — who did what, when{% endblock %}
{% block page_css %}<link rel="stylesheet" href="/static/css/audit.css">{% endblock %}
{% block content %}
<main>
  <div class="filters">
    <select id="fUser"><option value="">All users</option></select>
    <select id="fEntity"><option value="">All entities</option></select>
    <select id="fAction"><option value="">All actions</option><option>Saved</option><option>Created</option><option>Edited</option><option>Deleted</option><option>Login</option></select>
    <input type="date" id="fFrom"> <input type="date" id="fTo">
    <button onclick="go(1)">Filter</button>
    <span class="meta" id="meta"></span>
  </div>
  <div class="panel">
    <table>
      <thead><tr><th style="width:150px">WHEN</th><th style="width:110px">USER</th><th style="width:90px">ACTION</th><th style="width:150px">ENTITY</th><th>REFERENCE</th><th style="width:80px">CHANGES</th></tr></thead>
      <tbody id="rows"><tr><td colspan="6" class="empty">Loading audit trail&hellip;</td></tr></tbody>
    </table>
    <div class="pager">
      <button id="prev" onclick="go(PAGE-1)">&larr; Previous</button>
      <span id="pinfo"></span>
      <button id="next" onclick="go(PAGE+1)">Next &rarr;</button>
    </div>
  </div>
</main>
<script>
var PAGE=1,BOOT=false;
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function q(id){return document.getElementById(id).value;}
function go(p){
  PAGE=Math.max(1,p);
  var u='/dashboard/api/audit/?page='+PAGE+'&user='+encodeURIComponent(q('fUser'))+'&entity='+encodeURIComponent(q('fEntity'))+'&action='+encodeURIComponent(q('fAction'))+'&from='+q('fFrom')+'&to='+q('fTo');
  fetch(u,{credentials:'include'}).then(function(r){return r.json();}).then(function(d){
    if(!BOOT&&d.users){BOOT=true;
      d.users.forEach(function(x){var o=document.createElement('option');o.textContent=x;document.getElementById('fUser').appendChild(o);});
      d.entities.forEach(function(x){var o=document.createElement('option');o.textContent=x;document.getElementById('fEntity').appendChild(o);});}
    var tb=document.getElementById('rows');tb.innerHTML='';
    if(!d.rows.length){tb.innerHTML='<tr><td colspan="6" class="empty">No audit entries match these filters. Entries accumulate from 12-07-2026, the day the audit trail went live.</td></tr>';}
    d.rows.forEach(function(r,i){
      var tr=document.createElement('tr');tr.className='main-row';
      tr.innerHTML='<td>'+esc(r.when)+'</td><td><b>'+esc(r.user)+'</b></td><td class="act '+esc(r.action)+'">'+esc(r.action)+'</td><td>'+esc(r.entity)+'</td><td>'+esc(r.ref)+'</td><td>'+(r.hid?'<span class="view">&#9658; view</span>':'')+'</td>';
      if(r.hid){tr.onclick=function(){toggle(tr,r);};}
      tb.appendChild(tr);
    });
    document.getElementById('meta').textContent=d.total+' entries';
    document.getElementById('pinfo').textContent='Page '+d.page+' of '+d.pages;
    document.getElementById('prev').disabled=d.page<=1;
    document.getElementById('next').disabled=d.page>=d.pages;
  }).catch(function(e){document.getElementById('rows').innerHTML='<tr><td colspan="6" class="empty">'+esc(e.message)+'</td></tr>';});
}
function toggle(tr,r){
  if(tr.nextSibling&&tr.nextSibling.className==='detail'){tr.parentNode.removeChild(tr.nextSibling);return;}
  fetch('/dashboard/api/audit-detail/?entity='+encodeURIComponent(r.entity)+'&hid='+r.hid,{credentials:'include'}).then(function(x){return x.json();}).then(function(d){
    var dr=document.createElement('tr');dr.className='detail';
    var h='';
    (d.changes||[]).forEach(function(c){h+='<div class="chg"><b>'+esc(c.field)+':</b> <span class="old">'+esc(c.old||'(empty)')+'</span> <span class="new">'+esc(c.new||'(empty)')+'</span></div>';});
    if(!h)h='<div class="chg">'+esc(d.note||'No details')+'</div>';
    dr.innerHTML='<td colspan="6">'+h+'</td>';
    tr.parentNode.insertBefore(dr,tr.nextSibling);
  });
}
go(1);
</script>
{% endblock %}
