<!DOCTYPE html>
{% load static %}
<html lang="en">
<head><link rel="icon" type="image/png" href="/static/assets/logo-light.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/vendor/tailwind.min.css">
    <script src="/static/vendor/jquery-3.6.4.min.js"></script>
    <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="/static/vendor/datatables/jquery.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="{%static 'style.css' %}">
    <title>WW Testing Results</title>
    <script src="/static/vendor/jquery-3.6.4.min.js"></script>
    <script src="/static/vendor/datatables/jquery.dataTables.min.js"></script>
    <link href="/static/vendor/select2/select2.min.css" rel="stylesheet" />
    <script src="/static/vendor/select2/select2.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <h1 class="text-2xl font-bold mb-4">Waste Water RDS Report</h1>
        
        <div class="mb-4 flex justify-center items-center gap-20 flex-wrap">
            <div class="">
                <label class="block text-sm font-medium text-gray-700 mb-2">Sample ID:</label>
                <select name="sample_id" id="samples" class="border rounded p-2 w-96 border-gray-700" onchange="selectSample(this)">
                    <option selected disabled>Select Sample</option>
                    {% for id in all_sample_ids %}
                    <option value="{{ id }}">{{ id }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="">
                <label class="block text-sm font-medium text-gray-700 mb-2" for="">Title</label>
                <input class="border rounded p-2 w-96 border-gray-700" type="text" id="title" name="title">
            </div>
        </div>
        
        <form id="qcForm" method="post" enctype="multipart/form-data" onsubmit="submitform(event)" class="overflow-x-auto mt-6">
            {% csrf_token %}
            <table class="min-w-full border" id="data-table">
                <thead class="bg-gray-50" id="table-header">
                    <!-- Header will be dynamically populated based on report_type -->
                </thead>
                <tbody id="table-body">
                </tbody>
            </table>
                <input class="border rounded p-2 w-96 border-gray-700 hidden" type="text" id="location" name="location">
            <div class="my-10 space-y-3 flex flex-col">
                <label class="font-bold text-gray-900" for="">Legend</label>
                <input class="border rounded p-2 w-96 border-gray-700" type="text" value="N/A = Not Applicable" name="legend">
            </div>
            <button type="submit" class="bg-blue-600 w-48 py-4 text-gray-300 rounded-lg text-lg mt-4">Submit</button>
        </form>
    </div>

    <div id="loader" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:5px; display:flex; flex-direction:column; align-items:center;">
            <div class="spinner" style="border:4px solid #f3f3f3; border-top:4px solid #3498db; border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite;"></div>
            <p style="margin-top:10px;">Generating PDF, please wait...</p>
        </div>
    </div>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        $(document).ready(function () {
            $('select').select2();
            $(document).on('focus', '.datepicker', function() {
                $(this).datepicker({
                    dateFormat: "dd-MM-yy",
                    changeMonth: true,
                    changeYear: true
                });
            });
        });

        let currentReportType = null;

        // Function to render table header based on report_type
        function renderHeader(reportType) {
            const thead = document.getElementById('table-header');
            thead.innerHTML = '';
            
            const headerRow = document.createElement('tr');
            
            // Define headers with their properties (whether they should be input fields)
            const headers = [
                { key: 'sno', label: 'S.no', editable: false },
                { key: 'date', label: 'Date', editable: false, name: 'date_head' },
                { key: 'parameter', label: 'Parameter', editable: false, name: 'parameter_head' },
                { key: 'equipment', label: 'Equipment ID', editable: false, name: 'equipment_head' },
                { key: 'method', label: 'Test Method', editable: false, name: 'method_head' },
                { key: 'certified', label: 'RM/CRM Certified Value', editable: true, name: 'crm_head_1' },
                { key: 'acceptance', label: 'RM/CRM Acceptance Limit', editable: true, name: 'crm_head_2' },
                { key: 'crm_result', label: 'RM/CRM Test Results', editable: true, name: 'crm_head_3' }
            ];
            
            // Add sample/inlet/outlet headers based on report_type
            if (reportType === 'in-out') {
                headers.push({ key: 'inlet', label: 'Inlet', editable: false, name: 'inlet_head' });
                headers.push({ key: 'outlet', label: 'Outlet', editable: false, name: 'outlet_head' });
            } else {
                headers.push({ key: 'sample', label: 'Sample Results', editable: false, name: 'sample_head' });
            }
            
            headers.push(
                { key: 'performed', label: 'Performed By', editable: false, name: 'performed_head' },
                { key: 'reviewed', label: 'Reviewed By', editable: false, name: 'reviewed_head' },
                { key: 'status', label: 'Status', editable: false, name: 'status_head' }
            );
            
            headers.forEach(header => {
                const th = document.createElement('th');
                th.className = 'border p-2';
                
                if (header.editable) {
                    // Create input field for editable header
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.value = header.label;
                    input.name = header.name || `${header.key}_head`;
                    //input.className = 'w-full p-1 border rounded text-center font-bold bg-gray-50';
                    //input.style.fontWeight = 'bold';
                    input.style.textAlign = 'center';
                    th.appendChild(input);
                } else {
                    // Static text for non-editable headers
                    th.textContent = header.label;
                    th.style.fontWeight = 'bold';
                    th.style.textAlign = 'center';
                }
                
                headerRow.appendChild(th);
            });
            
            thead.appendChild(headerRow);
        }
        function safeValue(val) {
            return (val === undefined || val === null || val === '') ? 'N/A' : val;
        }

        function inputCell(name, value = '', extra = '') {
            const td = document.createElement('td');
            td.className = 'border p-2';
            const input = document.createElement('input');
            input.type = 'text';
            input.name = name;
            input.value = safeValue(value);
            input.className = `w-full p-1 border rounded ${extra}`;
            td.appendChild(input);
            return td;
        }

        function crmCell(index, crmValues) {
            const td = document.createElement('td');
            td.className = 'border p-2';
            if (crmValues && crmValues.length > 0) {
                crmValues.forEach(val => {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.name = `crm_result_${index}`;
                    input.value = safeValue(val);
                    input.className = 'w-full p-1 border rounded mb-1 bg-yellow-50 font-bold';
                    td.appendChild(input);
                });
            } else {
                const input = document.createElement('input');
                input.type = 'text';
                input.name = `crm_result_${index}`;
                input.value = 'N/A';
                input.className = 'w-full p-1 border rounded bg-yellow-50 font-bold';
                td.appendChild(input);
            }
            return td;
        }

        function populateTableFromJSON(data, reportType) {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            console.log('Populating table with data:', data);
            console.log('Report Type:', reportType);
            
            // Render header based on report_type
            renderHeader(reportType);

            // Get all main parameter indices
            const mainIndices = [];
            for (const key in data) {
                // Match pattern parameter_X (where X is a number) but NOT parameter_X_X
                const match = key.match(/^parameter_(\d+)$/);
                if (match) {
                    mainIndices.push(parseInt(match[1]));
                }
            }
            mainIndices.sort((a, b) => a - b);

            console.log('Main indices found:', mainIndices);

            let serialNo = 1;

            mainIndices.forEach(index => {
                const parameterName = data[`parameter_${index}`];
                if (!parameterName) return;

                // Collect CRM values - look for result_index_1, result_index_2, etc.
                let crmValues = [];
                let i = 1;
                while (data[`result_${index}_${i}`] !== undefined) {
                    crmValues.push(safeValue(data[`result_${index}_${i}`]));
                    i++;
                }
                // Also check for inlet/outlet CRM values for in-out report type
                if (reportType === 'in-out') {
                    i = 1;
                    while (data[`inlet_${index}_${i}`] !== undefined || data[`outlet_${index}_${i}`] !== undefined) {
                        const inletVal = data[`inlet_${index}_${i}`];
                        const outletVal = data[`outlet_${index}_${i}`];
                        if (inletVal !== undefined || outletVal !== undefined) {
                            crmValues.push(`${safeValue(inletVal)}`);
                        }
                        i++;
                    }
                }
                
                if (crmValues.length === 0) {
                    crmValues.push('N/A');
                }

                const row = document.createElement('tr');

                // S.no
                const sno = document.createElement('td');
                sno.className = 'border p-2 text-center';
                sno.textContent = serialNo++;
                row.appendChild(sno);

                // Editable fields
                row.appendChild(inputCell(`date_${index}`, data[`date_${index}`]));
                row.appendChild(inputCell(`parameter_${index}`, parameterName, 'font-bold'));
                row.appendChild(inputCell(`equipment_${index}`, data[`equipment_${index}`]));
                row.appendChild(inputCell(`method_${index}`, data[`method_${index}`]));
                row.appendChild(inputCell(`certified_${index}`, data[`certified_${index}`]));
                row.appendChild(inputCell(`acceptance_${index}`, data[`acceptance_${index}`]));
                row.appendChild(crmCell(index, crmValues));

                // Sample/Inlet/Outlet based on report_type
                if (reportType === 'in-out') {
                    row.appendChild(inputCell(`inlet_${index}`, data[`inlet_${index}`]));
                    row.appendChild(inputCell(`outlet_${index}`, data[`outlet_${index}`]));
                } else {
                    row.appendChild(inputCell(`sample_result_${index}`, data[`result_${index}`]));
                }

                // Performed / Reviewed - handle both naming conventions
                const performedBy = data[`performed_by_${index}`] !== undefined ? data[`performed_by_${index}`] : data[`performed_${index}`];
                const checkedBy = data[`checked_by_${index}`] !== undefined ? data[`checked_by_${index}`] : data[`checked_${index}`];
                const remarks = data[`remarks_${index}`] !== undefined ? data[`remarks_${index}`] : 'N/A';
                
                row.appendChild(inputCell(`performed_by_${index}`, performedBy));
                row.appendChild(inputCell(`reviewed_by_${index}`, checkedBy));
                row.appendChild(inputCell(`status_${index}`, remarks));

                tbody.appendChild(row);
            });
            
            console.log('Table populated successfully');
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        const csrftoken = getCookie('csrftoken');

        const selectSample = async (selectElement) => {
            const sample_id = selectElement.value;
            
            if (!sample_id || sample_id === 'Select Sample') {
                return;
            }
            
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="12" class="text-center p-8">Loading data......</td></tr>';
            
            try {
                const response = await fetch('/qc/ww_testing_results_sample/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': csrftoken
                    },
                    body: new URLSearchParams({ sample_id: sample_id })
                });

                if (response.ok) {
                    const result = await response.json();
                    console.log('API Response:', result);
                    
                    let jsonData = null;
                    let reportType = null;
                    
                    if (result.ww_data && result.ww_data.rds) {
                        jsonData = result.ww_data.rds;
                        reportType = result.ww_data.report_type;
                    } else if (result.rds) {
                        jsonData = result.rds;
                        reportType = result.report_type;
                    } else {
                        jsonData = result;
                        reportType = result.report_type;
                    }
                    
                    currentReportType = reportType || 'standard';
                    
                    if (jsonData && Object.keys(jsonData).length > 0) {
                        populateTableFromJSON(jsonData, currentReportType);
                    } else {
                        tbody.innerHTML = '<tr><td colspan="12" class="text-center p-8 text-red-500">No data found</td></tr>';
                    }
                } else {
                    tbody.innerHTML = '<tr><td colspan="12" class="text-center p-8 text-red-500">Failed to load data</td></tr>';
                }
            } catch (error) {
                console.error('Network error:', error);
                tbody.innerHTML = '<tr><td colspan="12" class="text-center p-8 text-red-500">Network error</td></tr>';
            }
        };

        function showLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'flex';
            }
        }

        function hideLoader() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.style.display = 'none';
            }
        }

        function submitform(e) {
            e.preventDefault();

            const form = document.getElementById("qcForm");
            const sample_id_form = $("#samples").val();
            console.log('sample_id', sample_id_form);
            const title = document.getElementById("title").value;
            const formData = new FormData(form);
            const data = {};

            formData.forEach((value, key) => {
                if (data[key]) {
                    if (!Array.isArray(data[key])) {
                        data[key] = [data[key]];
                    }
                    data[key].push(value);
                } else {
                    data[key] = value;
                }
            });
            
            data.sample_id = sample_id_form;
            data.title = title;
            data.report_type = currentReportType || 'standard';
            
            console.log('data sent-->', data);
            showLoader();
            
            fetch("/qc/ww_testing_results_sample_save/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrftoken
                },
                body: JSON.stringify(data)
            })
            .then(async response => {
                hideLoader();

                if (!response.ok) {
                    throw new Error("PDF generation failed");
                }

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);

                // Open PDF in new tab
                window.open(url, "_blank");

                // Revoke much later (important)
                setTimeout(() => {
                    window.URL.revokeObjectURL(url);
                }, 10000);
            })
            .catch(error => {
                hideLoader();
                console.error("Error:", error);
                alert("Failed to generate PDF. Please try again.");
            });
        }

        $(document).ready(async () => {
            $("#loc_err").show();
            
            try {
                // Get public IP
                const req_pip = await fetch('https://api.ipify.org?format=json');
                var public_ip = await req_pip.json();
                public_ip = public_ip.ip ? public_ip.ip : null;
                
                if (public_ip) {
                    // Get location from IP
                    let url = `https://ipinfo.io/${public_ip}/json?token=fdc5faa922a0b1`;
                    const req_loc_ip = await fetch(url);
                    var location = await req_loc_ip.json();
                    console.log(location);
                    
                    if (location) {
                        let city = location.city || '';
                        let locationValue = '';
                        
                        // Check if location is Karachi or Lahore
                        if (city.toLowerCase() === 'karachi') {
                            locationValue = 'Karachi';
                        } else if (city.toLowerCase() === 'lahore') {
                            locationValue = 'Lahore';
                        } else {
                            locationValue = 'Other';
                        }
                        
                        // Fill the input field
                        $('#location').val(locationValue);
                        
                        console.log('Location set to:', locationValue);
                        
                        setTimeout(function() {
                            $("#loc_err").hide();
                        }, 1000);
                    }
                }
            } catch (error) {
                console.error("Error fetching location:", error);
                $("#loc_err").text("Could not detect location").show();
                setTimeout(function() {
                    $("#loc_err").hide();
                }, 3000);
            }
        });
    </script>
</body>
</html>
