<!doctype html>
<html lang="en">
<head><link rel="icon" type="image/png" href="/static/assets/logo-light.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if user.is_authenticated %}
  {% load static %}

  <title>Envi Tech AL</title>
  <link rel="stylesheet" href="/static/vendor/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="/static/vendor/tailwind.min.css">
  <link rel="stylesheet" href="/static/vendor/datatables/jquery.dataTables.min.css">
  <link rel="stylesheet" href={% static "style.css" %}>

  <script src="/static/vendor/jquery-3.6.4.min.js"></script>
  <script src="/static/vendor/datatables/jquery.dataTables.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
  </style>
<link rel="stylesheet" href="/static/css/etal-theme.css">
</head>

<body class="bg-gray-100 font-sans antialiased">
  <!-- Header -->
  <header class="fixed top-0 w-full bg-gray-900 shadow-md z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="{% url 'nav' %}" class="flex items-center gap-2">
        <img class="h-12" src={% static '/assets/logo-light.png' %} alt="Logo">
      </a>

      <div class="flex items-center gap-6 text-gray-200">
        <span class="flex items-center gap-2 text-lg">
          <i class="fa-regular fa-user" style="color:#00ad54;"></i> <span class="text-green-400 font-medium">{{ user.username }}</span>
        </span>
        <a href="{% url 'logout' %}" 
           class="flex items-center gap-2 text-sm hover:text-red-400 transition">
          <i class="fa-solid fa-power-off text-red-500"></i> Logout
        </a>
      </div>
    </div>
  </header>

  <!-- Hero Section -->
  <section class="pt-24 pb-12 bg-gray-200 relative h-screen">
    <div class="max-w-7xl mx-auto text-center relative">
      <img class="h-72 mx-auto opacity-20 select-none" 
           src="/static/assets/0x0-removebg-preview.png" 
           alt="">
      <h1 class="text-5xl md:text-6xl font-bold text-green-900 opacity-20 tracking-widest font-serif mt-6">
        ENVI TECH AL
      </h1>
    </div>
  </section>

  <!-- Navigation Cards -->
  <section class="relative" style="margin-top: -13rem;">
    <div class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-6 px-6">
      <a href="{% url 'home' %}" 
         class="rounded-xl bg-gradient-to-r from-green-600 to-green-500 text-white p-6 text-center shadow-lg transform hover:scale-105 transition">
        <i class="fa-solid fa-clipboard-list text-2xl mb-3"></i>
        <h3 class="font-semibold text-lg">Reports</h3>
      </a>

      <a href="{% url 'certificate' %}" 
         class="rounded-xl bg-gradient-to-r from-green-700 to-green-600 text-white p-6 text-center shadow-lg transform hover:scale-105 transition">
        <i class="fa-solid fa-certificate text-2xl mb-3"></i>
        <h3 class="font-semibold text-lg">Certifications</h3>
      </a>

      <a href="{% url 'sample_main' %}" 
         class="rounded-xl bg-gradient-to-r from-green-500 to-green-600 text-white p-6 text-center shadow-lg transform hover:scale-105 transition">
        <i class="fa-solid fa-flask text-2xl mb-3"></i>
        <h3 class="font-semibold text-lg">Sample Registration</h3>
      </a>

      <a href="{% url 'qc_main' %}" 
         class="rounded-xl bg-gradient-to-r from-gray-800 to-green-700 text-white p-6 text-center shadow-lg transform hover:scale-105 transition">
        
        <i class="fa-solid fa-clipboard-list text-2xl mb-3"></i>
        <h3 class="font-semibold text-lg">QC Reports</h3>
      </a>

      {% if request.user.is_superuser %}
      <a href="/dashboard/dashboard/" 
         class="rounded-xl bg-gradient-to-r from-gray-700 to-gray-900 text-white p-6 text-center shadow-lg transform hover:scale-105 transition">
        <i class="fa-solid fa-chart-line text-2xl mb-3"></i>
        <h3 class="font-semibold text-lg">Dashboard</h3>
      </a>
      {% endif %}

      <a href="{% url 'job_main' %}" 
         class="rounded-xl bg-gradient-to-r from-green-600 to-green-700 text-white p-6 text-center shadow-lg transform hover:scale-105 transition">
        
        <i class="fa-solid fa-clipboard-list text-2xl mb-3"></i>
        <h3 class="font-semibold text-lg">Work Completion</h3>
      </a>
    </div>
  </section>

  <script src={% static '/js/app.js' %}?v=20260712 defer></script>
  {% else %}
  <script>window.location='/login/'</script>
  {% endif %}
</body>
</html>
